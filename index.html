<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h2>Fashion Store</h2>

        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#shop">Shop</a>
            <button id="cartButton">
                Cart (<span id="cartCount">0</span>)
            </button>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Find Your Perfect Style</h1>
            <p>Fashion for Men, Women, Electronics and Jewellery.</p>
            <a href="#shop" class="shop-now">Shop Now</a>
        </div>
    </section>

    <section class="category-images">
        <div class="category-box">
            <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=500&q=80" alt="Women Fashion">
            <h3>Women Fashion</h3>
        </div>

        <div class="category-box">
            <img src="https://images.unsplash.com/photo-1516826957135-700dedea698c?auto=format&fit=crop&w=500&q=80" alt="Men Fashion">
            <h3>Men Fashion</h3>
        </div>

        <div class="category-box">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=500&q=80" alt="Electronics">
            <h3>Electronics</h3>
        </div>
    </section>

    <section id="shop" class="shop-section">
        <h1>Shop Products</h1>

        <div class="controls">
            <input
                type="text"
                id="search"
                placeholder="Search products..."
            >

            <select id="category">
                <option value="all">All Categories</option>
                <option value="men's clothing">Men's Clothing</option>
                <option value="women's clothing">Women's Clothing</option>
                <option value="electronics">Electronics</option>
                <option value="jewelery">Jewellery</option>
            </select>
        </div>

        <div id="products"></div>
    </section>

    <div id="cartPanel" class="cart-panel hidden">
        <div class="cart-header">
            <h2>My Cart</h2>
            <button id="closeCart">×</button>
        </div>

        <div id="cartItems"></div>

        <h3>Total: ₹<span id="cartTotal">0</span></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
